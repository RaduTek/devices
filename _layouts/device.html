---
layout: default
---

<h2><a href="{{ page.url | absolute_url }}" class="title-link" title="Permalink">{{ page.title }}</a></h2>

{% if page.image %}
<figure class="device-photo">
    <img src="../{{ page.image }}" alt="{{ page.title }}">
</figure>
{% endif %}

<table class="device-specs border">
    <tbody>
        {% for row in site.data.device_spec_rows %}
        {% assign value = page[row.key] %}
        {% if value %}
        <tr>
            <th class="row-head">{{ row.label }}</th>
            <td>
                {{ value | markdownify }}
            </td>
        </tr>
        {% endif %}
        {% endfor %}
    </tbody>
</table>

<div class="device-content">{{ content }}</div>
